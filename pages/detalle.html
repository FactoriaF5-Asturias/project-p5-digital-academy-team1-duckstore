<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DuckStore - Detalle de producto." />
    <title>DuckStore | Detalle</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
</head>

<body>

    <header class="header">
        <a href="../index.html" class="header__logo">
            <img src="../assets/imgs/logo.png" alt="DuckStore logo" />
        </a>
        <nav class="nav" aria-label="Navegación principal">
            <ul class="nav__list">
                <li class="nav__item">
                    <a href="../index.html" class="nav__link">Inicio</a>
                </li>
                <li class="nav__item">
                    <a href="catalogo.html" class="nav__link">Catálogo</a>
                </li>
                <li class="nav__item">
                    <a href="contacto.html" class="nav__link">Contacto</a>
                </li>
            </ul>
        </nav>
        <a href="carrito.html" class="header__carrito">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="contador-carrito">0</span>
        </a>
    </header>

    <main class="detalle">

        <nav class="breadcrumb" aria-label="Navegación de migas de pan">
            <ol class="breadcrumb__list">
                <li class="breadcrumb__item">
                    <a href="../index.html" class="breadcrumb__link">Inicio</a>
                </li>
                <li class="breadcrumb__separator" aria-hidden="true">›</li>
                <li class="breadcrumb__item">
                    <a href="catalogo.html" class="breadcrumb__link">Catálogo</a>
                </li>
                <li class="breadcrumb__separator" aria-hidden="true">›</li>
                <li class="breadcrumb__item breadcrumb__item--active" aria-current="page" id="breadcrumb-nombre">
                    <!-- JS rellena el nombre del patito -->
                </li>
            </ol>
        </nav>

        <article id="detalle-producto" class="detalle__producto">
            <!-- JS rellena el detalle del patito -->
        </article>

    </main>

    <footer class="footer">
        <div class="footer__left">
            <a href="../index.html" class="footer__logo">
                <img src="../assets/imgs/logo.png" alt="DuckStore logo" />
            </a>
            <p class="footer__copy">🌟 2026 - DuckStore by Group 1 of F5 Bootcamp</p>
        </div>
        <div class="footer__right">
            <a href="https://www.facebook.com/factoriaf5" target="_blank" rel="noopener noreferrer" class="footer__link"
                aria-label="Facebook">
                <i class="fa-brands fa-facebook"></i> Facebook
            </a>
            <a href="https://www.instagram.com/factoria_f5" target="_blank" rel="noopener noreferrer"
                class="footer__link" aria-label="Instagram">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
        </div>
    </footer>

    <script type="module" src="../js/detalle.js"></script>

</body>

</html>
