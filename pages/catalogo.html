<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo - DuckStore</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <header class="header">
      <a href="index.html" class="header__logo">
        <img src="../assets/imgs/logo.png" alt="DuckStore logo" />
      </a>
      <nav class="nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a href="index.html" class="nav__link nav__link--active">Inicio</a>
          </li>
          <li class="nav__item">
            <a href="pages/catalogo.html" class="nav__link">Catálogo</a>
          </li>
          <li class="nav__item">
            <a href="pages/contacto.html" class="nav__link">Contacto</a>
          </li>
        </ul>
      </nav>
      <a href="pages/carrito.html" class="header__carrito">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="contador-carrito">0</span>
      </a>
    </header>

    <main class="catalog-container">
      <section class="catalog-intro">
        <h1 class="catalog-intro__title">Nuestros Patitos</h1>
        <p class="catalog-intro__subtitle">
          Colecciona alegría con nuestra selección premium de patitos de goma.
          Desde héroes galácticos hasta clásicos de bañera.
        </p>
      </section>

      <section class="filters">
        <button class="filters__btn filters__btn--active" data-category="todos">
          Todos
        </button>
        <button class="filters__btn" data-category="Clásicos">Clásicos</button>
        <button class="filters__btn" data-category="Superhéroes">
          Superhéroes
        </button>
        <button class="filters__btn" data-category="Edición Espacial">
          Edición Espacial
        </button>
        <button class="filters__btn" data-category="Aventura">Aventura</button>
      </section>

      <div class="product-grid" id="contenedor-patitos"></div>
    </main>

    <footer class="footer">
        <div class="footer__left">
            <a href="index.html" class="footer__logo">
                <img src="assets/imgs/logo.png" alt="DuckStore logo" />
            </a>
            <p class="footer__copy"> 2026 - DuckStore by Group 1 of F5 Bootcamp</p>
        </div>
        <div class="footer__right">
            <a href="https://www.facebook.com/factoriaf5" target="_blank" rel="noopener noreferrer" class="footer__link"
                aria-label="Facebook">
                <i class="fa-brands fa-facebook"></i> Facebook
            </a>
            <a href="https://www.instagram.com/factoria_f5" target="_blank" rel="noopener noreferrer"
                class="footer__link" aria-label="Instagram">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
        </div>
    </footer>

    <script type="module" src="../js/catalogo.js"></script>
  </body>
</html>
